<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body class="fade-page">

<div class="container-center">

<div class="card p-4 col-md-4">

<h3 class="text-center mb-4">Login</h3>

<form>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control">
</div>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input type="password" id="loginPass" class="form-control">

<button class="btn btn-outline-secondary"
type="button"
onclick="togglePassword('loginPass')">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button onclick="showSpinner()" class="btn btn-primary w-100">

<span id="spinner" class="spinner-border spinner-border-sm d-none"></span>

Login

</button>

<div class="text-center mt-3">

<a href="forgot-password.html">Forgot Password?</a><br>

<a href="register.html">Create Account</a>

</div>

</form>

</div>

</div>

<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
